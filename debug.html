<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>debug</title></head>
<body>
<pre id="log" style="color:#0f0;background:#000;font-size:14px;white-space:pre-wrap;"></pre>
<script>
  const log = document.getElementById('log');
  function add(msg) {
    log.textContent += msg + "\n\n";
  }
  window.addEventListener('error', function(e) {
    add('ERROR: ' + e.message + '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno);
  });
  window.addEventListener('unhandledrejection', function(e) {
    add('UNHANDLED REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason));
  });
  add('Listener attached. Now loading app.js as module...');
</script>
<script type="module">
  const log = document.getElementById('log');
  try {
    await import('./js/app.js');
    log.textContent += 'app.js module loaded WITHOUT throwing.\n\n';
  } catch (err) {
    log.textContent += 'IMPORT ERROR: ' + (err && err.stack ? err.stack : err) + '\n\n';
  }
</script>
</body>
</html>
